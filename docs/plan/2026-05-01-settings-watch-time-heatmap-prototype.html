<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Curated 设置概览 - 每日观看时间统计原型</title>
  <style>
    :root {
      color-scheme: dark;
      --background: #0d0f1a;
      --card: #141826;
      --border: #ffffff1a;
      --muted: #121827;
      --muted-foreground: #a2abc2;
      --foreground: #f8f7fb;
      --primary: #fe628e;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--background);
      color: var(--foreground);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(880px, calc(100vw - 32px));
      margin: 48px auto;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 14px;
      background: var(--card);
      box-shadow: 0 10px 28px rgb(0 0 0 / 12%);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 22px 22px 10px;
    }

    .icon-box {
      display: grid;
      width: 36px;
      height: 36px;
      flex: 0 0 auto;
      place-items: center;
      border: 1px solid color-mix(in srgb, var(--primary) 25%, transparent);
      border-radius: 10px;
      background: color-mix(in srgb, var(--primary) 12%, transparent);
      color: var(--primary);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.35;
      letter-spacing: 0;
    }

    .desc {
      margin: 4px 0 0;
      color: var(--muted-foreground);
      font-size: 14px;
      line-height: 1.5;
    }

    .content {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 14px 22px 22px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
    }

    .summary-item {
      min-width: 0;
      border: 1px solid color-mix(in srgb, var(--border) 72%, transparent);
      border-radius: 10px;
      background: color-mix(in srgb, var(--muted) 45%, transparent);
      padding: 13px 14px;
    }

    .label {
      margin: 0;
      color: var(--muted-foreground);
      font-size: 12px;
      font-weight: 600;
      line-height: 1.4;
    }

    .value {
      margin: 5px 0 0;
      font-size: 22px;
      font-weight: 700;
      line-height: 1.2;
      font-variant-numeric: tabular-nums;
    }

    .empty {
      margin: 0;
      color: var(--muted-foreground);
      font-size: 14px;
      line-height: 1.5;
    }

    @media (max-width: 720px) {
      main {
        width: min(100vw - 24px, 880px);
        margin-block: 24px;
      }

      .summary {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 440px) {
      .summary {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <article class="card" aria-labelledby="watch-time-title">
      <header class="card-header">
        <span class="icon-box" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M7 3v3M17 3v3M4 9h16M6.5 5h11A2.5 2.5 0 0 1 20 7.5v10A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-10A2.5 2.5 0 0 1 6.5 5Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" />
            <path d="M8 14h.01M12 14h.01M16 14h.01" stroke="currentColor" stroke-width="3" stroke-linecap="round" />
          </svg>
        </span>
        <div>
          <h1 id="watch-time-title">每日观看时间</h1>
          <p class="desc">过去 3 个月的有效观看时长统计。</p>
        </div>
      </header>

      <div class="content">
        <section class="summary" aria-label="观看时间摘要">
          <div class="summary-item">
            <p class="label">本周观看</p>
            <p class="value">8h 20m</p>
          </div>
          <div class="summary-item">
            <p class="label">过去 3 个月</p>
            <p class="value">42h</p>
          </div>
          <div class="summary-item">
            <p class="label">最长连续</p>
            <p class="value">9 天</p>
          </div>
          <div class="summary-item">
            <p class="label">最高单日</p>
            <p class="value">3h 45m</p>
          </div>
        </section>
        <p class="empty">无观看记录时，这里只显示简短空态文案，不再显示日期图表占位。</p>
      </div>
    </article>
  </main>
</body>
</html>
